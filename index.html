<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>

    <link rel="apple-touch-icon" sizes="57x57" href="icon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="icon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="icon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="icon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="icon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="icon/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icon/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">

    <link rel="manifest" href="/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="icon/ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Calc">
    <meta name="apple-mobile-web-app-title" content="Calc">
    <meta name="msapplication-starturl" content="index.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="css/normalize.css"/>
    <link rel="stylesheet" href="css/style.css"/>

    <script src="js/jquery.js"></script>
    <script src="js/modernizr.js"></script>
    <script src="js/math.js"></script>
    <script src="js/main.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('js/sw.js').then(
                        function(registration) {
                            // Registration was successful
                            console.log('ServiceWorker registration successful with scope: ', registration.scope); },
                        function(err) {
                            // registration failed :(
                            console.log('ServiceWorker registration failed: ', err);
                        });
            });
        }
    </script>
</head>
<body>
<main>
    <div class="calc">
        <div class="result">0</div>
        <div class="current first">0</div>
        <div class="show"></div>
        <div class="proces"></div>

        <div class="numbers">
            <div class="btn sin" data="/">÷</div>
            <div class="btn sin" data="*">×</div>
            <div class="btn sin" data="-">−</div>
            <div class="btn sin" data="+">+</div>

            <div class="clearfix"></div>

            <div class="btn one">7</div>
            <div class="btn one">8</div>
            <div class="btn one">9</div>

            <div class="clearfix"></div>

            <div class="btn one">4</div>
            <div class="btn one">5</div>
            <div class="btn one">6</div>
            <div class="btn clear">c</div>

            <div class="clearfix"></div>

            <div class="btn one">1</div>
            <div class="btn one">2</div>
            <div class="btn one">3</div>

            <div class="clearfix"></div>

            <div class="btn sin dot" data=".">.</div>
            <div class="btn one">0</div>
            <div class="btn one back">&#8249;</div>
            <div class="btn res">=</div>

        </div>
    </div>
</main>
</body>
</html>
